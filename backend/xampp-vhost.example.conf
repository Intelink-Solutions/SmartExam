# Smart Exam Pro - XAMPP Apache VirtualHost Example
# Copy this into: C:\xampp\apache\conf\extra\httpd-vhosts.conf
# Then add host entries in C:\Windows\System32\drivers\etc\hosts

# API host for Laravel backend
<VirtualHost *:80>
    ServerName smartexampro-api.local
    DocumentRoot "C:/Users/mensc/Desktop/academeon-nexus-main/academeon-nexus-main/backend/public"

    <Directory "C:/Users/mensc/Desktop/academeon-nexus-main/academeon-nexus-main/backend/public">
        AllowOverride All
        Require all granted
        Options Indexes FollowSymLinks
    </Directory>

    ErrorLog "logs/smartexampro-api-error.log"
    CustomLog "logs/smartexampro-api-access.log" common
</VirtualHost>

